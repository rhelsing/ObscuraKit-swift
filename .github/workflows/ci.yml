name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # libsignal is cloned + Rust-built at setup (gitignored, not vendored in-repo).
  LIBSIGNAL_VERSION: v0.40.0

jobs:
  # Fast PR gate — pure-logic unit tests, no server (mirrors Kotlin :lib:test).
  unit:
    name: Kit (unit tests)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # Runner default Xcode is 15.4 (Swift 5.10); Package.swift needs tools 6.0.
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)"

      - name: Cache libsignal (source + built FFI)
        id: libsignal
        uses: actions/cache@v4
        with:
          path: vendored/libsignal
          key: libsignal-${{ env.LIBSIGNAL_VERSION }}-macos14

      - name: Fetch + build libsignal FFI (host)
        if: steps.libsignal.outputs.cache-hit != 'true'
        run: |
          brew install protobuf  # prost-build needs protoc on PATH
          git clone --depth 1 --branch "$LIBSIGNAL_VERSION" \
            https://github.com/signalapp/libsignal vendored/libsignal
          (cd vendored/libsignal && ./swift/build_ffi.sh -r)

      - name: Unit tests
        run: ./dev.sh test --filter UnitTests

  # Integration suite against a CONTAINERIZED obscura-server (latest GHCR image)
  # — same shape as Kotlin's lib-integration, with Colima providing Docker on macOS.
  # Must run on an INTEL runner: arm64 macOS runners have nested virtualization
  # disabled, so the Colima VM can never boot (colima's own CI uses macos-15-intel).
  integration:
    name: Kit (integration, containerized server)
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)"

      - name: Cache libsignal (source + built FFI)
        id: libsignal
        uses: actions/cache@v4
        with:
          path: vendored/libsignal
          key: libsignal-${{ env.LIBSIGNAL_VERSION }}-macos15-intel

      - name: Fetch + build libsignal FFI (host)
        if: steps.libsignal.outputs.cache-hit != 'true'
        run: |
          brew install protobuf  # prost-build needs protoc on PATH
          git clone --depth 1 --branch "$LIBSIGNAL_VERSION" \
            https://github.com/signalapp/libsignal vendored/libsignal
          (cd vendored/libsignal && ./swift/build_ffi.sh -r)

      - name: Docker via Colima
        uses: douglascamata/setup-docker-macos-action@v1.1.0

      - name: Start obscura-server (latest prebuilt image)
        run: |
          # Clone only for docker-compose.yml (services + env); the server
          # itself comes prebuilt from GHCR — no Rust build in CI.
          git clone --depth 1 https://github.com/barrelmaker97/obscura-server /tmp/obscura-server
          cd /tmp/obscura-server
          cat > compose.ci.yml <<'EOF'
          services:
            obscura-server:
              image: ghcr.io/barrelmaker97/obscura-server:latest
              pull_policy: always
              environment:
                # Prod runs 3 load-balanced instances (~3x effective limits); this
                # single container would rate-limit the suite partway through.
                # Rate limiting isn't under test here — effectively disable.
                OBSCURA_RATE_LIMIT_PER_SECOND: 1000
                OBSCURA_RATE_LIMIT_BURST: 2000
                OBSCURA_RATE_LIMIT_AUTH_PER_SECOND: 1000
                OBSCURA_RATE_LIMIT_AUTH_BURST: 2000
          EOF
          docker compose -f docker-compose.yml -f compose.ci.yml up -d --wait

      - name: Wait for server ready
        run: |
          for i in $(seq 1 60); do
            if curl -s -o /dev/null http://localhost:3000/; then echo "server up"; exit 0; fi
            sleep 5
          done
          echo "server did not become ready" >&2
          (cd /tmp/obscura-server && docker compose logs obscura-server | tail -50)
          exit 1

      - name: Integration tests
        env:
          OBSCURA_TEST_API: http://localhost:3000
          # Client-side pacing exists for prod rate limits; the local container
          # has them disabled, so drop the sleeps (auth pacing alone is 1s/call).
          SERVER_REQUEST_DELAY_MS: 0
          AUTH_REQUEST_DELAY_MS: 0
        run: ./dev.sh test --filter ScenarioTests
