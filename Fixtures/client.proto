// Obscura client content protocol (v1)
//
// The message layer for client-to-client (C2) communication: the payload
// carried inside EncryptedMessage.content, which the zero-knowledge server
// never parses. This is a distinct *layer* from the server transport
// (obscura/v1/obscura.proto), not a newer version of it — hence the
// `obscura.client.v1` package (layer = client, version = v1). A future
// breaking client-contract change becomes a genuine `obscura.client.v2`.
//
// Behavioral contract: see SPEC.md and the conformance/ vectors at the repo
// root. The protos pin the message *shape*; SPEC.md + vectors pin behavior.

syntax = "proto3";
package obscura.client.v1;

// =============================================================================
// Signal Protocol Envelope (client-side, opaque to server)
// The server treats this as raw bytes in Envelope.message / Submission.message.
// =============================================================================

message EncryptedMessage {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    TYPE_PREKEY_MESSAGE = 1;
    TYPE_ENCRYPTED_MESSAGE = 2;
  }
  Type type = 1;
  bytes content = 2;
}

// =============================================================================
// Main Message Wrapper
//
// Exactly one payload is set; the payload's field *is* the message-type
// discriminator (there is no separate type enum to keep in sync). "Which
// oneof arm is set" answers "what kind of message is this" — a mismatch
// between kind and content is unrepresentable by construction.
// =============================================================================

message ClientMessage {
  // Reserved: v2 carried a parallel `Type type = 1` discriminator enum plus a
  // flat field space (mime_type=11, display_duration=12, attachment_id=15,
  // attachment_expires=16). The discriminator is replaced by the `payload`
  // oneof; the loose scalars are folded into their payload sub-messages.
  reserved 1, 11, 12, 15, 16;
  reserved "type";

  uint64 timestamp = 2;

  oneof payload {
    // Base messaging
    TextMessage text = 10;

    // Friend request / response
    FriendRequest friend_request = 20;
    FriendResponse friend_response = 21;

    // Session reset
    SessionReset session_reset = 25;

    // Device management
    DeviceLinkApproval device_link_approval = 30;
    DeviceAnnounce device_announce = 31;
    DeviceRecoveryAnnounce device_recovery_announce = 32;

    // Sync (new device onboarding)
    HistoryChunk history_chunk = 40;
    SettingsSync settings_sync = 41;
    ReadSync read_sync = 42;
    SyncBlob sync_blob = 43;
    SentSync sent_sync = 44;
    ContentReference content_reference = 45;
    ChunkedContentReference chunked_content_reference = 46;
    SyncRequest sync_request = 47;

    // ORM layer (Level 3)
    ModelSync model_sync = 50;
    FriendSync friend_sync = 51;
    ModelSignal model_signal = 52;
  }
}

// =============================================================================
// Base messaging payloads
// =============================================================================

// A human-authored message: plain text, with an optional media caption hint
// and a view-once display duration. Real media/attachments travel as a
// ContentReference or ChunkedContentReference; large model state travels as a
// ModelSync.
message TextMessage {
  string text = 1;              // Message body
  string mime_type = 2;         // Optional media-kind hint for an inline caption
  uint32 display_duration = 3;  // View-once seconds; 0 = persistent
}

// Ask to become friends with `username`.
message FriendRequest {
  string username = 1;
}

// Answer a friend request.
message FriendResponse {
  string username = 1;
  bool accepted = 2;            // true = accepted, false = declined
}

// Tear down the Signal session with the peer (e.g. after a key change).
message SessionReset {
  string reason = 1;            // Human-readable reason (diagnostic only)
}

// =============================================================================
// Device Management
// =============================================================================

// Information about a single device
message DeviceInfo {
  string device_uuid = 1;           // Device UUID (e.g., "550e8400-e29b-41d4...")
  string device_id = 2;              // Server-assigned device UUID
  string device_name = 3;           // Human-readable name (e.g., "iPhone")
  bytes signal_identity_key = 4;    // Signal identity public key (33 bytes with 0x05 prefix)
}

// Sent from existing device to new device to complete linking.
// Transfers the P2P identity, device list, and optionally data exports.
message DeviceLinkApproval {
  bytes p2p_public_key = 1;         // P2P identity public key (33 bytes - Curve25519 with prefix)
  bytes p2p_private_key = 2;        // P2P identity private key (32 bytes) - transferred securely
  bytes recovery_public_key = 3;    // Recovery public key (32 bytes) for revocation verification
  bytes challenge_response = 4;     // Echo back challenge from link code
  repeated DeviceInfo own_devices = 5;  // Complete list of linked devices
  bytes friends_export = 6;         // Serialized friend list (optional)
  bytes sessions_export = 7;        // Serialized Signal sessions (optional)
  bytes trusted_ids_export = 8;     // Serialized trusted identities (optional)
}

// Broadcast to all friends when device list changes.
// LWW semantics - latest timestamp wins.
message DeviceAnnounce {
  repeated DeviceInfo devices = 1;  // Current complete device list (replaces old list)
  uint64 timestamp = 2;             // For LWW merge (latest wins)
  bool is_revocation = 3;           // True if this removes a device
  bytes signature = 4;              // Signed with device key (add) or recovery key (revoke)
  bytes recovery_public_key = 5;    // For friend to verify future revocation signatures
}

// Account recovery announcement.
// Sent to friends when recovering from backup; signed with recovery key to
// prove legitimacy.
message DeviceRecoveryAnnounce {
  repeated DeviceInfo new_devices = 1;  // New device list (just the recovery device)
  uint64 timestamp = 2;
  bytes signature = 3;                  // Signed with recovery key
  bool is_full_recovery = 4;            // True if replacing all old devices
  bytes recovery_public_key = 5;        // Recovery public key for verification
}

// =============================================================================
// Sync (New Device Onboarding)
// =============================================================================

// Chunk of history sent to new device
message HistoryChunk {
  repeated MessageEntry entries = 1;
  bool is_final = 2;                // True if this is the last chunk
}

// Single message entry for history sync
message MessageEntry {
  string message_id = 1;            // Unique ID: hash(content + timestamp + author_device)
  uint64 timestamp = 2;             // Client timestamp (ms since epoch)
  bytes content = 3;                // The actual message payload
  bytes author_device_id = 4;       // Which device created this
  bytes signature = 5;              // sign(message_id + timestamp + content, device_key)
}

// Opaque serialized settings blob, synced to the account's own devices.
message SettingsSync {
  bytes settings_data = 1;
}

// Mark a message read, synced to the account's own devices.
message ReadSync {
  string read_message_id = 1;
}

// Full state transfer blob (gzipped JSON).
// Sent from existing device to new device after link approval.
message SyncBlob {
  bytes compressed_data = 1;        // gzip(JSON.stringify({ friends, messages, settings }))
}

// Request a full state push from another own device.
message SyncRequest {}

// Notify own devices of a message just sent to a friend (for incremental sync).
message SentSync {
  string recipient_username = 1;    // The friend the message was sent to (own-device echo)
  string message_id = 2;            // Unique message ID
  uint64 timestamp = 3;             // When the message was sent
  bytes content = 4;                // The message content
}

// Sync friend list changes to own devices.
// Sent to all own devices when a friend is added or removed.
message FriendSync {
  string username = 1;              // Friend's username
  string action = 2;                // "add" or "remove"
  string status = 3;                // Friend status (pending, accepted)
  repeated DeviceInfo devices = 4;  // Friend's devices (for fan-out)
  uint64 timestamp = 5;             // When the change occurred
}

// =============================================================================
// Attachments (E2E Encrypted)
// =============================================================================

// Reference to an encrypted attachment.
// The blob is encrypted with AES-256-GCM before upload. This message carries
// the key to recipients via Signal encryption. Upload once, share key to many.
message ContentReference {
  string attachment_id = 1;         // Server attachment ID
  bytes content_key = 2;            // AES-256-GCM key (32 bytes)
  bytes nonce = 3;                  // AES-GCM nonce (12 bytes)
  bytes content_hash = 4;           // SHA-256 of plaintext for integrity
  string content_type = 5;          // MIME type (e.g., "image/jpeg")
  uint64 size_bytes = 6;            // Original size for progress/preview
  string file_name = 7;             // Original filename for file attachments
}

// Reference to a chunked large file (>950KB, up to 100MB).
// Each chunk is encrypted separately with its own key.
message ChunkedContentReference {
  string file_id = 1;               // Unique ID for the entire file
  repeated ChunkInfo chunks = 2;    // Ordered list of chunk references
  bytes complete_hash = 3;          // SHA-256 of reassembled plaintext
  string content_type = 4;          // MIME type
  uint64 total_size_bytes = 5;      // Total file size
  string file_name = 6;             // Original filename
}

// Single chunk within a chunked file
message ChunkInfo {
  uint32 index = 1;                 // Chunk position (0-based)
  string attachment_id = 2;         // Server attachment ID for this chunk
  bytes content_key = 3;            // AES-256-GCM key (32 bytes)
  bytes nonce = 4;                  // AES-GCM nonce (12 bytes)
  bytes chunk_hash = 5;             // SHA-256 of this chunk's plaintext
  uint64 size_bytes = 6;            // Size of this chunk
}

// =============================================================================
// ORM Layer (Level 3)
// =============================================================================

// CRDT model sync operation.
// Sent between devices to synchronize model state (stories, streaks, etc.).
// Uses the existing fan-out + self-sync patterns from Level 2.
message ModelSync {
  string model = 1;                 // Model name: "story", "streak", "settings"
  string id = 2;                    // Entry ID: "story_1706389200_abc123"
  Op op = 3;                        // Operation type
  uint64 timestamp = 4;             // Lamport timestamp for CRDT ordering
  bytes data = 5;                   // JSON-encoded model data
  string author_device_id = 7;      // Which device created this entry

  reserved 6;                       // was `bytes signature` — a keyless SHA-256 that was
  reserved "signature";             // never verified; Signal already authenticates the payload

  enum Op {
    OP_UNSPECIFIED = 0;
    OP_UPDATE = 1;      // Only for LWW models
    OP_DELETE = 2;      // Soft delete (tombstone)
    OP_CREATE = 3;      // Was 0; renumbered so 0 can be OP_UNSPECIFIED
  }
}

// Ephemeral signal kinds — transient real-time presence for a model context.
enum SignalKind {
  SIGNAL_KIND_UNSPECIFIED = 0;
  SIGNAL_KIND_TYPING = 1;
  SIGNAL_KIND_STOPPED_TYPING = 2;
  SIGNAL_KIND_READ = 3;
}

// Ephemeral model signal — real-time presence attached to a model context.
// Not persisted, not CRDT-merged; in-memory only, auto-expires. The sender's
// identity and the timestamp come from the authenticated ClientMessage envelope,
// so they are intentionally NOT duplicated here.
message ModelSignal {
  string model = 1;         // Model namespace, e.g. "directMessage"
  SignalKind kind = 2;      // Which transient state
  string context_id = 3;    // Context the signal applies to (e.g. the conversation id)
}
